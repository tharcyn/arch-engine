name: Test and Governance Enforcement

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Enforce Freeze Hygiene Guard
        # MUST run before test execution to prevent snapshot masking of freeze-boundary drift
        run: bash packages/core/tests/freeze/utils/verify-freeze-clean.sh

      - name: Run Deterministic Snapshots
        run: npm run test
