name: typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Typecheck core
        run: npx tsc --noEmit -p packages/core

      - name: Typecheck CLI
        run: npx tsc --noEmit -p packages/cli
